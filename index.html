<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://kit.fontawesome.com/f88f487569.js" crossorigin="anonymous"></script>

    <title>Music Player</title>

    <style>
        body {
            font-family: Poppins, sans-serif;
            background-image: url(/images/background2.jpg);
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .player {
            width: 320px;
            padding: 20px;
            backdrop-filter: blur(40px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border-radius: 15px;
            text-align: center;
        }

        .action button.play {
            background-image: linear-gradient(120deg, var(--secondary-color), var(--primary-color));
            color: var(--white-color);
        }

        .thumbnail {
            width: 120px;
            height: 120px;
            margin: auto;
            border-radius: 50%;
            overflow: hidden;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        img.play {
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .progress {
            width: 100%;
        }

        .action button {
            margin: 10px;
            padding: 10px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="player">

        <div class="thumbnail">
            <img id="thumb" src="" />
        </div>

        <h3 id="title">Title</h3>
        <p id="artist">Artist</p>

        <audio id="song"></audio>

        <div>
            <span id="start">00:00</span>
            <span id="end">00:00</span>
        </div>

        <input type="range" id="progress" class="progress" value="0" min="0" max="100" />

        <div class="action">

            <button class="prev">
                ⏮
            </button>

            <button class="playBtn">
                ▶
            </button>

            <button class="pauseBtn hidden">
                ⏸
            </button>

            <button class="next">
                ⏭
            </button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
